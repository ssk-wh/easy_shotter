name: Build DEB Package

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  build-deb:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(head -1 debian/changelog | grep -oP '\(.*?\)' | tr -d '()')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debhelper \
            cmake \
            qtbase5-dev \
            libqt5x11extras5-dev \
            libxcb1-dev \
            libxcb-ewmh-dev \
            libxcb-icccm4-dev \
            libx11-dev \
            libatspi2.0-dev \
            libglib2.0-dev \
            pkg-config \
            fakeroot \
            dpkg-dev \
            librsvg2-bin

      - name: Generate PNG icons from SVG
        run: |
          cd resources
          for size in 16 24 32 48 128 256 512; do
            rsvg-convert -w $size -h $size app-icon.svg -o easyshotter_${size}.png
          done

      - name: Build DEB package
        run: dpkg-buildpackage -us -uc -b

      - name: Collect DEB packages
        run: |
          mkdir -p dist
          cp ../easyshotter_*.deb dist/

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: easyshotter_${{ steps.version.outputs.version }}_amd64.deb
          path: dist/*.deb

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/easyshotter_*.deb
